<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smartloop — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script defer type="module" src="script.js"></script>
  <style>
    :root {
      --bg: #080c0a;
      --surface: #0f1710;
      --card: #111a13;
      --border: #1e2e20;
      --accent: #00e67a;
      --accent-dim: #00b85f;
      --accent-glow: rgba(0,230,122,0.15);
      --text: #e8f0ea;
      --muted: #6b7f6e;
      --danger: #ff4d4d;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,230,122,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,122,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index:1;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo span { color: var(--accent); }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.8)} }
    .back-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    .page {
      position: relative;
      z-index: 1;
      max-width: 540px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .page-header {
      margin-bottom: 40px;
    }
    .page-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .page-sub {
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 300;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .field-group:last-of-type { margin-bottom: 0; }

    label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .invite-field {
      position: relative;
    }
    .invite-field input { padding-left: 44px; }
    .invite-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #040a06;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .btn-primary:hover {
      background: var(--accent-dim);
      box-shadow: 0 4px 24px rgba(0,230,122,0.35);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform:translateY(0); }

    .panel-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .panel-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .panel-footer a:hover { text-decoration: underline; }

    .terms-note {
      margin-top: 16px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 13px;
      color: var(--text);
      max-width: 280px;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
    }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.error { border-left-color: var(--danger); }
  </style>
</head>
<body>
<nav>
  <div class="logo"><div class="logo-dot"></div>Smart<span>loop</span></div>
  <a href="index.html" class="back-link">← Back to Login</a>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-tag">New Account</div>
    <h1 class="page-title">Start earning today</h1>
    <p class="page-sub">Set up your account in under a minute</p>
  </div>

  <div class="form-card">
    <form id="registerForm">
      <div class="two-col">
        <div class="field-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Jane Doe" required />
        </div>
        <div class="field-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="07XX XXX XXX" required />
        </div>
      </div>

      <div class="field-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required />
      </div>

      <div class="divider"></div>

      <div class="field-group">
        <label for="inviteCode">Invite Code <span style="color:var(--muted);font-size:10px">(optional)</span></label>
        <div class="invite-field">
          <span class="invite-icon">🔗</span>
          <input type="text" id="inviteCode" placeholder="Enter referral code" />
        </div>
      </div>

      <button type="submit" class="btn-primary">Create Account →</button>
    </form>
  </div>

  <p class="panel-footer">Already have an account? <a href="index.html">Sign in</a></p>
  <p class="terms-note">By creating an account you agree to our Terms of Service<br>and confirm you are 18+ years old.</p>
</div>

<div class="toast" id="toast"></div>
<script>
  window.showToast = function(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3500);
  };
</script>
</body>
</html>
